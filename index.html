<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥗 Leftover Rescue - Meal Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>🥗 Leftover Rescue</h1>
                <p class="tagline">Turn your leftovers into delicious meals</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="ingredientInput" 
                        placeholder="Add an ingredient (e.g., chicken, tomato, rice)"
                        class="ingredient-input"
                    >
                    <button id="addBtn" class="btn btn-add">+ Add</button>
                </div>
            </section>

            <!-- Fridge Inventory Section -->
            <section class="fridge-section">
                <h2>🧊 Your Fridge</h2>
                <div id="ingredientTags" class="ingredient-tags">
                    <p class="empty-message">No ingredients yet. Add some to get started!</p>
                </div>
            </section>

            <!-- Search Button -->
            <section class="search-section">
                <button id="searchBtn" class="btn btn-search" disabled>
                    🔍 Find Recipes
                </button>
                <p class="recipe-count" id="recipeCount"></p>
            </section>

            <!-- Results Section -->
            <section class="results-section">
                <h2 id="resultsTitle" style="display: none;">🍳 Recipes You Can Make</h2>
                <div id="recipesContainer" class="recipes-grid">
                    <p class="empty-message" id="noResults">Search for recipes using the ingredients in your fridge!</p>
                </div>
                <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                    <div class="spinner"></div>
                    <p>Finding delicious recipes...</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by Spoonacular API | Help reduce food waste 🌍</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
